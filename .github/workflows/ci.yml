name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24.14.0'
          package-manager-cache: false

      - name: Update Corepack
        run: npm install --global corepack@latest

      - name: Enable Corepack
        run: corepack enable pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run test suite
        run: make test

  release-readiness:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '25.8.1'
          package-manager-cache: false

      - name: Update Corepack
        run: npm install --global corepack@latest

      - name: Enable Corepack
        run: corepack enable pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build release candidate artifacts
        env:
          RELEASE_REPO: ${{ github.repository }}
          RELEASE_TAG: pr-${{ github.event.pull_request.number || github.ref_name }}
        run: pnpm run release:verify

      - name: Resolve formula filename
        id: formula
        run: |
          formula_file="$(node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).name + '.rb'")"
          echo "formula_file=${formula_file}" >> "$GITHUB_OUTPUT"

      - name: Upload release candidate artifacts
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: release-candidate
          if-no-files-found: ignore
          path: |
            dist/release-assets/*
            dist/npm/*.tgz
            dist/homebrew/${{ steps.formula.outputs.formula_file }}
